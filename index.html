<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncMusic - Escucha con amigos</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Tipografía moderna de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #050505; 
            /* Fondo con luces sutiles */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.12), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.12), transparent 25%);
            background-attachment: fixed;
            color: #f8fafc; 
        }

        /* Clases personalizadas de diseño (Glassmorphism & Gradients) */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
            outline: none;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover:not(:disabled) {
            box-shadow: 0 10px 20px -5px rgba(147, 51, 234, 0.4);
            transform: translateY(-1px);
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #818cf8, #c084fc);
        }

        .yt-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            background: #000;
        }
        .yt-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        /* Toast animaciones */
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        
        /* Scrollbar suave */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Animación de Reacciones Flotantes */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(var(--rot-start)); opacity: 0; }
            10% { opacity: 1; scale: 1; }
            100% { transform: translateY(-180px) scale(1.5) rotate(var(--rot-end)); opacity: 0; }
        }
        .floating-emoji {
            animation: floatUp 2s ease-out forwards;
            position: absolute;
            bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dragging {
            opacity: 0.5;
            background-color: rgba(255,255,255,0.1) !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden relative">

    <!-- Efecto de luces de fondo extra -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/10 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/10 blur-[120px]"></div>
    </div>

    <!-- Navbar -->
    <nav class="glass-panel border-b-0 border-white/5 p-4 shadow-lg z-20 sticky top-0">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-2 rounded-xl shadow-lg shadow-purple-500/20">
                    <i data-lucide="headphones" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Sync<span class="text-gradient">Music</span></h1>
            </div>
            <div id="statusBadge" class="px-4 py-1.5 rounded-full text-xs font-semibold bg-black/30 text-slate-300 flex items-center gap-2 border border-white/5 backdrop-blur-md transition-colors shadow-inner">
                <span class="w-2 h-2 rounded-full bg-slate-500" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col gap-8 mt-4 z-10">
        
        <!-- Controles de Sala -->
        <div class="glass-panel rounded-3xl p-6 sm:p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-white">
                <i data-lucide="users" class="w-6 h-6 text-indigo-400"></i>
                Sala de Escucha Compartida
            </h2>
            
            <div id="roomSetup" class="flex flex-col gap-5">
                <!-- Solicitud de Nombre de Usuario antes de entrar -->
                <div class="bg-black/20 p-5 rounded-2xl border border-white/5">
                    <label class="block text-sm font-semibold text-slate-300 mb-2">¿Cómo te llamas?</label>
                    <input type="text" id="initialUsername" placeholder="Ingresa tu nombre para entrar..." class="w-full md:w-1/2 glass-input rounded-xl px-4 py-3 text-white transition focus:ring-2 focus:ring-purple-500/50">
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button id="btnCreateRoom" disabled class="flex-1 btn-gradient text-white font-semibold py-3 px-4 rounded-xl flex justify-center items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Crear Nueva Sala
                    </button>
                    <div class="flex-1 flex gap-2">
                        <input type="text" id="inputRoomId" placeholder="Código de la sala..." class="w-full glass-input rounded-xl px-4 py-3 uppercase text-center font-mono font-bold text-white tracking-widest">
                        <button id="btnJoinRoom" disabled class="bg-white/10 hover:bg-white/20 border border-white/10 text-white font-semibold py-3 px-6 rounded-xl transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i data-lucide="log-in" class="w-5 h-5"></i> Unirse
                        </button>
                    </div>
                </div>
            </div>

            <!-- Información de la sala activa -->
            <div id="roomActiveInfo" class="hidden flex-col gap-4">
                <div class="flex flex-col sm:flex-row items-center justify-between bg-black/20 p-5 rounded-2xl border border-white/5">
                    <div class="flex flex-col">
                        <span class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1">Estás en la sala</span>
                        <span id="displayRoomId" class="text-4xl font-mono font-bold tracking-widest text-gradient">---</span>
                    </div>
                    <div class="flex gap-3 mt-4 sm:mt-0">
                        <button id="btnCopyRoom" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white py-2 px-4 rounded-xl text-sm font-medium transition flex items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copiar Código
                        </button>
                        <button id="btnLeaveRoom" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 py-2 px-4 rounded-xl text-sm font-medium transition flex items-center gap-2 border border-red-500/20">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Salir de la sala
                        </button>
                    </div>
                </div>
                <!-- Participantes Activos -->
                <div class="bg-black/20 p-4 rounded-2xl border border-white/5 flex items-center gap-3 overflow-x-auto custom-scrollbar">
                    <div class="bg-indigo-500/20 p-2 rounded-xl border border-indigo-500/30 flex-shrink-0">
                        <i data-lucide="users" class="w-5 h-5 text-indigo-400"></i>
                    </div>
                    <span class="text-sm text-slate-300 font-semibold whitespace-nowrap">Conectados:</span>
                    <div id="connectedUsersList" class="flex items-center gap-2 flex-nowrap">
                        <!-- Nombres de usuarios inyectados aquí -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Layout Principal (Oculto hasta entrar a una sala) -->
        <div id="playerSection" class="hidden grid-cols-1 lg:grid-cols-3 gap-8 relative">
            
            <!-- Columna Izquierda: Reproductor y Buscador -->
            <div id="playerLeftCol" class="col-span-1 lg:col-span-2 flex flex-col gap-6">
                
                <!-- Buscador Integrado -->
                <div class="relative z-50">
                    <div class="glass-panel p-2 rounded-2xl flex gap-2 focus-within:ring-2 focus-within:ring-purple-500/50 transition-all shadow-lg">
                        <div class="pl-4 flex items-center text-slate-400">
                            <i data-lucide="search" class="w-5 h-5 text-indigo-400"></i>
                        </div>
                        <input type="text" id="inputSearch" placeholder="Busca una canción, pega enlace de video o playlist..." class="flex-1 bg-transparent border-none outline-none text-white px-2 placeholder-slate-500 font-medium">
                        <button id="btnSearch" class="btn-gradient text-white py-3 px-8 rounded-xl font-bold transition flex items-center gap-2 disabled:opacity-50">
                            Buscar
                        </button>
                    </div>
                    
                    <!-- Resultados de búsqueda -->
                    <div id="searchResults" class="hidden absolute top-full left-0 w-full mt-3 bg-[#0f172a]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl max-h-96 overflow-y-auto custom-scrollbar flex-col divide-y divide-white/5 overflow-hidden z-50">
                        <!-- Los resultados se inyectan aquí -->
                    </div>
                </div>

                <!-- Info Reproduciendo Ahora -->
                <div class="glass-panel p-4 rounded-2xl flex items-center gap-4 relative overflow-hidden group border border-indigo-500/20">
                    <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 opacity-50 group-hover:opacity-100 transition duration-500"></div>
                    <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-3 rounded-xl shadow-lg shadow-purple-500/20 relative z-10 animate-pulse">
                        <i data-lucide="music" class="text-white w-6 h-6"></i>
                    </div>
                    <div class="flex-1 min-w-0 relative z-10 flex flex-col justify-center">
                        <span class="text-indigo-300 text-[10px] uppercase font-bold tracking-widest mb-1 block">Reproduciendo ahora</span>
                        <div class="flex items-center gap-2 flex-wrap">
                            <p id="nowPlayingText" class="text-white font-bold truncate text-base lg:text-lg drop-shadow-md">Esperando canción...</p>
                            <span id="nowPlayingAddedBy" class="hidden text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm bg-white/10 text-slate-200 border border-white/5 flex items-center gap-1 whitespace-nowrap">
                                <i data-lucide="user" class="w-3 h-3 text-indigo-400"></i> <span id="nowPlayingAddedByName"></span>
                            </span>
                        </div>
                    </div>
                    <!-- Botón de copiar enlace -->
                    <button id="btnCopyVideoLink" class="hidden relative z-10 bg-white/5 hover:bg-white/20 p-2.5 rounded-xl border border-white/10 transition tooltip shadow-lg" title="Copiar enlace de YouTube">
                        <i data-lucide="link" class="w-5 h-5 text-indigo-300"></i>
                    </button>
                </div>

                <!-- Contenedor del reproductor de YouTube con capa de reacciones -->
                <div class="yt-container shadow-[0_0_40px_-10px_rgba(168,85,247,0.2)] border border-white/10 rounded-3xl relative z-0 group overflow-hidden bg-black">
                    <div id="youtubePlayer"></div>
                    <!-- Capa invisible para atrapar las reacciones animadas -->
                    <div id="reactionOverlay" class="absolute inset-0 pointer-events-none flex items-end justify-center overflow-hidden"></div>
                </div>
                
                <!-- Controles Inferiores y Reacciones -->
                <div class="flex flex-col sm:flex-row justify-between items-center bg-black/20 p-4 rounded-2xl border border-white/5 gap-4">
                    
                    <!-- Barra de Reacciones -->
                    <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-full border border-white/10 backdrop-blur-sm shadow-inner">
                        <span class="text-xs text-slate-400 font-semibold mr-1 hidden sm:inline"><i data-lucide="sparkles" class="w-4 h-4 inline text-yellow-400"></i> Reaccionar:</span>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-2 transition-all transform text-2xl cursor-pointer drop-shadow-lg" data-emoji="❤️">❤️</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-2 transition-all transform text-2xl cursor-pointer drop-shadow-lg" data-emoji="🔥">🔥</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-2 transition-all transform text-2xl cursor-pointer drop-shadow-lg" data-emoji="🎶">🎶</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-2 transition-all transform text-2xl cursor-pointer drop-shadow-lg" data-emoji="😎">😎</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-2 transition-all transform text-2xl cursor-pointer drop-shadow-lg" data-emoji="😂">😂</button>
                    </div>

                    <div class="flex gap-3 flex-wrap justify-end">
                        <!-- Botón Modo Teatro -->
                        <button id="btnTheaterMode" class="text-slate-300 hover:text-white flex items-center gap-2 transition px-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 tooltip backdrop-blur-sm" title="Expandir pantalla">
                            <i data-lucide="monitor-play" class="w-5 h-5"></i> <span class="hidden sm:inline font-semibold">Teatro</span>
                        </button>
                        <!-- Botón Saltar Siguiente -->
                        <button id="btnSkipNext" class="bg-white/10 hover:bg-white/20 text-white font-semibold flex items-center gap-2 transition px-5 py-3 rounded-xl border border-white/10 backdrop-blur-sm">
                            <i data-lucide="skip-forward" class="w-5 h-5"></i> Saltar
                        </button>
                        <!-- Botón Forzar Sincronización -->
                        <button id="btnForceSync" class="text-indigo-300 hover:text-white flex items-center gap-1 transition px-4 py-3 bg-indigo-500/20 hover:bg-indigo-500/40 rounded-xl border border-indigo-500/30 tooltip backdrop-blur-sm" title="Forzar resincronización">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Cola y Chat (Ajustado para scroll perfecto) -->
            <div class="col-span-1 flex flex-col gap-4 h-[600px] lg:h-[calc(100vh-7rem)] lg:sticky lg:top-24 min-h-0">
                
                <!-- Pestañas Cola / Chat -->
                <div class="glass-panel rounded-3xl flex flex-col flex-1 overflow-hidden shadow-2xl min-h-0">
                    
                    <div class="flex border-b border-white/10 bg-black/20 flex-shrink-0">
                        <button id="tabQueue" class="flex-1 py-4 text-sm font-bold text-white border-b-2 border-purple-500 flex justify-center items-center gap-2 bg-white/5 transition">
                            <i data-lucide="list-music" class="w-5 h-5 text-purple-400"></i> Cola
                        </button>
                        <button id="tabChat" class="flex-1 py-4 text-sm font-semibold text-slate-400 hover:text-slate-200 flex justify-center items-center gap-2 transition">
                            <i data-lucide="message-square" class="w-5 h-5"></i> Chat
                            <span id="unreadBadge" class="hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-lg ml-1">0</span>
                        </button>
                    </div>

                    <!-- Panel: Cola de Reproducción -->
                    <div id="panelQueue" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col relative bg-black/10">
                        <div class="sticky top-0 bg-slate-900/80 backdrop-blur-md border-b border-white/5 p-3 flex justify-between items-center z-10 flex-shrink-0">
                            <span class="text-[10px] text-slate-300 font-bold uppercase tracking-wider ml-2">Siguientes en la lista</span>
                            <button id="btnClearQueue" class="text-[10px] font-bold uppercase tracking-wider bg-red-500/20 hover:bg-red-500/40 text-red-200 px-3 py-1.5 rounded-lg transition border border-red-500/30 flex items-center gap-1">
                                <i data-lucide="trash-2" class="w-3 h-3"></i> Vaciar
                            </button>
                        </div>
                        
                        <div id="queueItemsContainer" class="p-3 flex flex-col gap-3 min-h-[100px]">
                            <!-- La cola se inyecta aquí -->
                        </div>
                        
                        <div id="emptyQueueMsg" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 text-sm p-6 text-center mt-10">
                            <div class="bg-white/5 p-5 rounded-full mb-4 border border-white/5">
                                <i data-lucide="music-4" class="w-10 h-10 text-slate-500"></i>
                            </div>
                            <span class="font-bold text-slate-300 mb-1 text-base">La cola está vacía</span>
                            <p class="text-xs text-slate-400">Busca una canción o playlist y añádela para continuar la fiesta.</p>
                        </div>
                    </div>

                    <!-- Panel: Chat -->
                    <div id="panelChat" class="hidden flex-1 flex-col overflow-hidden relative bg-black/10">
                        <div id="chatMessages" class="flex-1 overflow-y-auto custom-scrollbar p-5 flex flex-col gap-4">
                            <!-- Los mensajes se inyectan aquí -->
                        </div>
                        <div class="p-3 bg-black/40 border-t border-white/10 backdrop-blur-md flex-shrink-0">
                            <form id="chatForm" class="flex gap-2">
                                <input type="text" id="inputChat" placeholder="Escribe un mensaje..." class="flex-1 glass-input rounded-xl px-4 py-3 text-sm text-white font-medium" autocomplete="off">
                                <button type="submit" class="btn-gradient text-white p-3 rounded-xl transition flex items-center justify-center shadow-lg">
                                    <i data-lucide="send" class="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </main>

    <!-- Contenedor de Toasts -->
    <div id="toastContainer" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Elementos del DOM ---
        const els = {
            statusBadge: document.getElementById('statusBadge'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            roomSetup: document.getElementById('roomSetup'),
            initialUsername: document.getElementById('initialUsername'),
            roomActiveInfo: document.getElementById('roomActiveInfo'),
            connectedUsersList: document.getElementById('connectedUsersList'),
            btnCreateRoom: document.getElementById('btnCreateRoom'),
            inputRoomId: document.getElementById('inputRoomId'),
            btnJoinRoom: document.getElementById('btnJoinRoom'),
            displayRoomId: document.getElementById('displayRoomId'),
            btnCopyRoom: document.getElementById('btnCopyRoom'),
            btnLeaveRoom: document.getElementById('btnLeaveRoom'),
            playerSection: document.getElementById('playerSection'),
            playerLeftCol: document.getElementById('playerLeftCol'),
            inputSearch: document.getElementById('inputSearch'),
            btnSearch: document.getElementById('btnSearch'),
            searchResults: document.getElementById('searchResults'),
            nowPlayingText: document.getElementById('nowPlayingText'),
            nowPlayingAddedBy: document.getElementById('nowPlayingAddedBy'),
            nowPlayingAddedByName: document.getElementById('nowPlayingAddedByName'),
            btnCopyVideoLink: document.getElementById('btnCopyVideoLink'),
            btnForceSync: document.getElementById('btnForceSync'),
            btnSkipNext: document.getElementById('btnSkipNext'),
            btnTheaterMode: document.getElementById('btnTheaterMode'),
            tabQueue: document.getElementById('tabQueue'),
            tabChat: document.getElementById('tabChat'),
            unreadBadge: document.getElementById('unreadBadge'),
            panelQueue: document.getElementById('panelQueue'),
            queueItemsContainer: document.getElementById('queueItemsContainer'),
            btnClearQueue: document.getElementById('btnClearQueue'),
            panelChat: document.getElementById('panelChat'),
            emptyQueueMsg: document.getElementById('emptyQueueMsg'),
            chatMessages: document.getElementById('chatMessages'),
            chatForm: document.getElementById('chatForm'),
            inputChat: document.getElementById('inputChat'),
            reactionOverlay: document.getElementById('reactionOverlay')
        };

        // Inicializar iconos
        lucide.createIcons();

        // --- Utilidades de Interfaz ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-900 border-red-700' : (type === 'success' ? 'bg-green-900 border-green-700' : 'bg-slate-800 border-slate-700');
            toast.className = `toast-enter ${bgClass} border text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2 max-w-xs`;
            
            let iconName = 'info';
            if(type === 'error') iconName = 'alert-circle';
            if(type === 'success') iconName = 'check-circle';
            
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i> <span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Reproducir sonido suave al recibir mensaje
        function playChatSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); 
                
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) { console.error("Error reproduciendo sonido", e); }
        }

        function updateConnectionStatus(isConnected, text) {
            els.statusText.textContent = text;
            els.statusBadge.className = isConnected 
                ? 'px-4 py-1.5 rounded-full text-xs font-bold bg-green-500/20 text-green-300 flex items-center gap-2 border border-green-500/30 shadow-[0_0_10px_rgba(34,197,94,0.2)]'
                : 'px-4 py-1.5 rounded-full text-xs font-bold bg-black/30 text-slate-400 flex items-center gap-2 border border-white/5';
            els.statusDot.className = isConnected ? 'w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.8)]' : 'w-2 h-2 rounded-full bg-slate-500';
        }

        // Cambio de Pestañas (Cola / Chat)
        els.tabQueue.addEventListener('click', () => {

        async function performSearch(query, isRetry = false) {
            if (YOUTUBE_API_KEYS.length === 0 || YOUTUBE_API_KEYS[0] === "TU_API_KEY_DE_YOUTUBE_AQUI") {
                showToast("Por favor, configura tu API Key de YouTube.", "error"); return;

            }

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`;

            try {
                const res = await fetch(url);
                if (!res.ok) {
                    const errData = await res.json();
                    // Si el error es por límite de cuota (403), intentamos con la siguiente llave
                    if (errData.error?.errors?.[0]?.reason === 'quotaExceeded' || errData.error?.code === 403) {
                        if (currentKeyIndex < YOUTUBE_API_KEYS.length - 1) {
                            currentKeyIndex++;
                            console.log(`Cuota agotada. Cambiando a la API Key #${currentKeyIndex + 1}`);
                            return performSearch(query, true); // Reintentar con nueva llave
                        } else {
                            throw new Error("Límite diario de API alcanzado. ¡Usa enlaces directos de YouTube!");
                        }
                    }
                    throw new Error(errData.error?.message || "Error API");
                }
                const data = await res.json();
                
                const videos = data.items.map(item => ({
                    id: item.id.videoId,
                    title: item.snippet.title.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&#39;/g, "'"),
                    uploaderName: item.snippet.channelTitle,
                    thumbnail: item.snippet.thumbnails.medium.url,
                    duration: 0

                els.searchResults.classList.add('hidden');

                if (!isRetry) {
                    els.btnSearch.disabled = false;

            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) {
                    const errData = await res.json();
                    if (errData.error?.errors?.[0]?.reason === 'quotaExceeded' || errData.error?.code === 403) {
                        if (currentKeyIndex < YOUTUBE_API_KEYS.length - 1) {
                            currentKeyIndex++;
                            return loadPlaylist(playlistId, true);
                        } else {
                            throw new Error("Límite diario alcanzado. No se pueden cargar playlists hoy.");
                        }
                    }
                    throw new Error("La playlist es privada o no existe.");
                }
                const data = await res.json();

                const videos = data.items
                    // Filtrar videos eliminados o privados
                    .filter(item => item.snippet.title !== "Private video" && item.snippet.title !== "Deleted video")
                    .map(item => ({
                        id: item.snippet.resourceId.videoId,
                        title: item.snippet.title ? item.snippet.title.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&#39;/g, "'") : "Sin título",
                        uploaderName: item.snippet.videoOwnerChannelTitle || "Desconocido",
                        thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "",
                        duration: 0
                    }));

                if (videos.length > 0) {
                    await enqueuePlaylist(videos);
                    showToast(`¡Se añadieron ${videos.length} videos de la playlist a la cola!`, "success");
                } else {
                    showToast("La playlist está vacía o sus videos son privados.", "error");
                }
            } catch (err) {
                showToast("Error: " + err.message, "error");
            } finally {
                if (!isRetry) {
                    els.btnSearch.disabled = false;
                    els.btnSearch.innerHTML = 'Buscar';
                }
            }
        }

        function renderChat(chatArray) {
            els.chatMessages.innerHTML = '';
            
            if(!chatArray) {
                previousChatCount = 0;
                return;
            }

            // Lógica para reproducir sonido si hay mensajes nuevos de otros
            if (previousChatCount !== -1 && chatArray.length > previousChatCount) {
                const newMessages = chatArray.slice(previousChatCount);
                // Excluir los mensajes del sistema para no hacer ruido con notificaciones automáticas
                const hasExternalNewMsg = newMessages.some(msg => msg.user !== username && !msg.isSystem);
                if (hasExternalNewMsg) {
                    playChatSound();
                }

                // NUEVO: Actualizar el indicador de mensajes no leídos si el chat está oculto
                if (els.panelChat.classList.contains('hidden')) {
                    // Contamos los mensajes nuevos que no sean nuestros
                    const unreadNew = newMessages.filter(msg => msg.user !== username).length;
                    if (unreadNew > 0) {
                        unreadCount += unreadNew;
                        els.unreadBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                        els.unreadBadge.classList.remove('hidden');
                    }
                }
            }
            previousChatCount = chatArray.length;
            
            const visibleChat = chatArray.slice(-50);
            
            visibleChat.forEach(msg => {
                const div = document.createElement('div');
                
                // Renderizado especial si es un mensaje de sistema
                if (msg.isSystem) {
                    div.className = "flex justify-center w-full my-1";
                    div.innerHTML = `<span class="text-[10px] text-slate-400/80 italic bg-white/5 px-3 py-1 rounded-full border border-white/5 shadow-sm">${msg.text}</span>`;
                    els.chatMessages.appendChild(div);
                    return;
                }

                const isMe = msg.user === username;
                div.className = `flex flex-col max-w-[85%] ${isMe ? 'self-end items-end' : 'self-start items-start'} mb-1`;
                
                const timeStr = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                div.innerHTML = `
                    <span class="text-[9px] font-bold text-slate-400 mb-1 px-1 uppercase tracking-wider">${isMe ? 'Tú' : msg.user} • ${timeStr}</span>
                    <div class="px-4 py-2.5 rounded-2xl text-sm shadow-md ${isMe ? 'bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-tr-sm font-medium' : 'bg-white/10 border border-white/5 text-slate-100 rounded-tl-sm font-medium'} break-words">
                        ${msg.text}
                    </div>
                `;
                els.chatMessages.appendChild(div);
            });
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
        }

        function renderParticipants(participantsObj) {
            els.connectedUsersList.innerHTML = '';
            if (!participantsObj) return;

            const users = Object.values(participantsObj);
            users.forEach((name, idx) => {
                const isMe = name === username;
                const span = document.createElement('span');
                span.className = `text-[11px] px-3 py-1 rounded-full font-bold whitespace-nowrap shadow-sm transition-all tracking-wide ${isMe ? 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-purple-500/20' : 'bg-white/10 text-slate-200 border border-white/5'}`;
                span.textContent = isMe ? 'Tú' : name;
                els.connectedUsersList.appendChild(span);
            });
        }

        // --- Player logic ---
        function playNextFromQueue() {
            if (lastKnownState && lastKnownState.queue && lastKnownState.queue.length > 0) {
                const nextVideo = lastKnownState.queue[0];
                const newQueue = lastKnownState.queue.slice(1); 
                
                if (isPlayerReady && ytPlayer) {
                    ytPlayer.loadVideoById(nextVideo.id);
                }
                
                updateRoomState(nextVideo.id, true, 0, newQueue, nextVideo.title, nextVideo.addedBy || username);
                return true;
            }
            return false;
        }

        function loadAndSyncVideo(videoId, title = "Desconocido") {
            if (isPlayerReady && ytPlayer) {
                els.searchResults.classList.add('hidden');
                els.inputSearch.value = '';
                ytPlayer.loadVideoById(videoId);
                updateRoomState(videoId, true, 0, null, title, username);
                sendSystemMessage(`▶️ ${username} reprodujo "${title}" directamente`);
                showToast("Canción seleccionada", "success");
            }
        }
        
        window.loadAndSyncVideo = loadAndSyncVideo;

        document.addEventListener('click', (e) => {
            if (!els.inputSearch.contains(e.target) && !els.searchResults.contains(e.target)) {
                els.searchResults.classList.add('hidden');
            }
        });

        // --- Lógica de Firebase Auth ---
        if (auth && db) {
            async function initAuth() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) { showToast("Error al conectar", "error"); }
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    updateConnectionStatus(true, "Conectado");
                    // Los botones se activan solo si escribiste un nombre
                    const hasName = els.initialUsername.value.trim().length > 0;
                    els.btnCreateRoom.disabled = !hasName;
                    els.btnJoinRoom.disabled = !hasName;
                } else {
                    currentUser = null;
                    updateConnectionStatus(false, "Desconectado");
                    els.btnCreateRoom.disabled = true;
                    els.btnJoinRoom.disabled = true;
                }
            });
            initAuth();
        }

        // --- Lógica de YouTube API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('youtubePlayer', {
                height: '100%', width: '100%', videoId: '', 
                playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 0, 'rel': 0, 'autoplay': 1 },
                events: {
                    'onReady': () => { isPlayerReady = true; },
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerStateChange(event) {
            // Reproducción automática de la cola al terminar la canción
            if (event.data === YT.PlayerState.ENDED) {
                playNextFromQueue();
                return;
            }

            if (!currentRoomId || !currentUser || isRemoteUpdate) return;

            if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                const videoData = ytPlayer.getVideoData();
                if (!videoData || !videoData.video_id) return;
                
                const isPlaying = event.data === YT.PlayerState.PLAYING;
                // Intentamos sacar el título desde el reproductor, si no existe lo dejamos nulo para no sobrescribirlo
                const title = videoData.title || null;
                const currentAddedBy = lastKnownState ? lastKnownState.addedBy : username;
                
                updateRoomState(videoData.video_id, isPlaying, ytPlayer.getCurrentTime(), null, title, currentAddedBy);
            }
        }

        // --- Lógica de Salas (Firestore) ---
        async function updateRoomState(videoId, isPlaying, timestamp, overrideQueue = null, videoTitle = null, addedBy = null) {
            if (!currentRoomId || !currentUser) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                const payload = {
                    videoId: videoId,
                    isPlaying: isPlaying,
                    timestamp: timestamp,
                    updatedAt: Date.now(),
                    updatedBy: currentUser.uid
                };
                if (overrideQueue !== null) payload.queue = overrideQueue;
                if (videoTitle !== null) payload.videoTitle = videoTitle;
                if (addedBy !== null) payload.addedBy = addedBy;
                
                await setDoc(roomRef, payload, { merge: true });
            } catch (error) { console.error("Error actualizando estado:", error); }
        }

        async function joinRoom(roomId) {
            if (!currentUser) return;
            if (unsubscribeRoom) unsubscribeRoom();

            username = els.initialUsername.value.trim();

            currentRoomId = roomId.toUpperCase();
            
            els.roomSetup.classList.add('hidden');
            els.roomActiveInfo.classList.remove('hidden');
            els.roomActiveInfo.classList.add('flex');
            els.displayRoomId.textContent = currentRoomId;
            els.playerSection.classList.remove('hidden');
            els.playerSection.classList.add('grid');
            showToast(`Entraste a la sala ${currentRoomId}`, 'success');

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            
            // Añadir el usuario a la lista de participantes de la sala y enviar mensaje de sistema
            try {
                await setDoc(roomRef, { participants: { [currentUser.uid]: username } }, { merge: true });
                sendSystemMessage(`👋 ${username} se ha unido a la sala`);
            } catch(e) { console.error(e); }
            
            // Escuchar cambios de la sala
            unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    renderQueue(data.queue || []);
                    renderChat(data.chat || []);
                    renderParticipants(data.participants || {});

                    // Actualizar Título de Reproduciendo Ahora
                    if (data.videoTitle) {
                        els.nowPlayingText.textContent = data.videoTitle;
                        els.nowPlayingText.title = data.videoTitle; // tooltip
                        if (data.addedBy) {
                            els.nowPlayingAddedBy.classList.remove('hidden');
                            els.nowPlayingAddedByName.textContent = data.addedBy;
                        } else {
                            els.nowPlayingAddedBy.classList.add('hidden');
                        }
                    } else {
                        els.nowPlayingText.textContent = "Esperando canción...";
                        els.nowPlayingAddedBy.classList.add('hidden');
                    }

                    // Mostrar el botón de copiar solo si hay video activo
                    if (data.videoId) {
                        els.btnCopyVideoLink.classList.remove('hidden');
                        els.btnCopyVideoLink.dataset.url = `https://www.youtube.com/watch?v=${data.videoId}`;
                    } else {
                        els.btnCopyVideoLink.classList.add('hidden');
                        delete els.btnCopyVideoLink.dataset.url;
                    }

                    if (data.latestReaction && data.latestReaction.id !== lastReactionId) {
                        lastReactionId = data.latestReaction.id; 
                        showFloatingReaction(data.latestReaction.emoji, data.latestReaction.user);
                    }

                    handleRemoteStateChange(data);
                }
            }, (error) => {
                showToast("Error de conexión con la sala.", "error");
            });
        }

        function handleRemoteStateChange(data) {
            if (!isPlayerReady || !ytPlayer || !ytPlayer.getVideoData) return;
            
            if (data.updatedAt && data.updatedAt === lastVideoUpdateTimestamp) {
                lastKnownState = data;
                return; 
            }
            lastVideoUpdateTimestamp = data.updatedAt;

            if (data.updatedBy === currentUser.uid) {
                lastKnownState = data;
                return;
            }
            
            lastKnownState = data;
            isRemoteUpdate = true; 

            try {
                const currentVideoId = ytPlayer.getVideoData().video_id;
                
                if (data.videoId && currentVideoId !== data.videoId) {
                    if (data.isPlaying) ytPlayer.loadVideoById(data.videoId, data.timestamp);
                    else ytPlayer.cueVideoById(data.videoId, data.timestamp);
                } else if (data.videoId) {
                    const currentTime = ytPlayer.getCurrentTime() || 0;
                    const timeDiff = Math.abs(currentTime - data.timestamp);
                    
                    if (timeDiff > 2.5) ytPlayer.seekTo(data.timestamp, true);

                    if (data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    else if (!data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PAUSED) ytPlayer.pauseVideo();
                }
            } catch (e) {}

            setTimeout(() => { isRemoteUpdate = false; }, 500);
        }

        async function leaveRoom() {
            if (currentRoomId && currentUser) {
                // Quitar al usuario de la lista de participantes antes de salir y mandar notificación
                try {
                    sendSystemMessage(`🚪 ${username} ha salido de la sala`);
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                    await updateDoc(roomRef, { [`participants.${currentUser.uid}`]: deleteField() });
                } catch(e) { console.error(e); }
            }

            if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            currentRoomId = null; lastKnownState = null; lastVideoUpdateTimestamp = null; lastReactionId = null; previousChatCount = -1; unreadCount = 0;
            if (isPlayerReady && ytPlayer) ytPlayer.stopVideo();

            els.roomActiveInfo.classList.add('hidden'); els.roomActiveInfo.classList.remove('flex');
            els.playerSection.classList.add('hidden'); els.playerSection.classList.remove('grid');
            els.roomSetup.classList.remove('hidden'); els.inputRoomId.value = '';
            els.nowPlayingText.textContent = "Esperando canción...";
            els.nowPlayingAddedBy.classList.add('hidden');
            els.btnCopyVideoLink.classList.add('hidden');
            els.unreadBadge.classList.add('hidden');
            els.unreadBadge.textContent = '0';
        }

        // Escuchar cuando el usuario cierra la pestaña para borrarlo de la lista
        window.addEventListener('beforeunload', () => {
            if (currentRoomId && currentUser) {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                // Usamos fire-and-forget
                updateDoc(roomRef, { [`participants.${currentUser.uid}`]: deleteField() });
            }
        });

        // --- Listeners de Eventos UI ---
        els.btnCreateRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            if (!els.initialUsername.value.trim()) return showToast("Ingresa tu nombre", "error");
            joinRoom(generateRoomCode());
        });

        els.btnJoinRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            if (!els.initialUsername.value.trim()) return showToast("Ingresa tu nombre", "error");
            const code = els.inputRoomId.value.trim();
            if (code.length < 3) return showToast("Ingresa un código válido", "error");
            joinRoom(code);
        });

        els.btnLeaveRoom.addEventListener('click', leaveRoom);

        els.btnCopyRoom.addEventListener('click', () => {
            const tempInput = document.createElement('input'); tempInput.value = currentRoomId;
            document.body.appendChild(tempInput); tempInput.select(); document.execCommand('copy');
            document.body.removeChild(tempInput); showToast("Código copiado al portapapeles", "success");
        });

        els.btnSearch.addEventListener('click', () => {
            const query = els.inputSearch.value.trim();
            if (!query) return;
            
            const videoId = extractYouTubeID(query);
            const playlistId = extractPlaylistID(query);

            if (videoId || playlistId) {
                els.searchResults.classList.add('hidden'); 
                els.inputSearch.value = '';
                
                if (videoId) loadAndSyncVideo(videoId);
                if (playlistId) loadPlaylist(playlistId);
            } else { 
                performSearch(query); 
            }
        });

        els.inputRoomId.addEventListener('keypress', (e) => { if (e.key === 'Enter') els.btnJoinRoom.click(); });
        els.inputSearch.addEventListener('keypress', (e) => { if (e.key === 'Enter') els.btnSearch.click(); });
        els.initialUsername.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !els.btnCreateRoom.disabled) els.btnCreateRoom.click(); 
        });

        // Evento Enviar Chat
        els.chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = els.inputChat.value;
            if (text) {
                sendChatMessage(text);
                els.inputChat.value = '';
            }
        });

        els.btnForceSync.addEventListener('click', () => {
            if (lastKnownState) {
                showToast("Forzando sincronización...", "info");
                handleRemoteStateChange({...lastKnownState, updatedBy: 'force', updatedAt: Date.now()}); 
            } else if (isPlayerReady) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.video_id) {
                    const currentAddedBy = lastKnownState ? lastKnownState.addedBy : username;
                    updateRoomState(videoData.video_id, ytPlayer.getPlayerState() === YT.PlayerState.PLAYING, ytPlayer.getCurrentTime(), null, videoData.title, currentAddedBy);
                    showToast("Estado sincronizado", "success");
                }
            }
        });

    </script>
</body>
</html>
