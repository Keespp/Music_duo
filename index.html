<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncMusic - Escucha con amigos</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .yt-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
            background: #000;
        }
        .yt-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        /* Toast animaciones */
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        
        /* Scrollbar para resultados */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-md z-20">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-400">
                <i data-lucide="headphones" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold text-white">Sync<span class="text-indigo-400">Music</span></h1>
            </div>
            <div id="statusBadge" class="px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 flex items-center gap-2 transition-colors">
                <span class="w-2 h-2 rounded-full bg-slate-500" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col gap-6 mt-4">
        
        <!-- Controles de Sala -->
        <div class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="users" class="w-5 h-5 text-indigo-400"></i>
                Sala de Escucha Compartida
            </h2>
            
            <div id="roomSetup" class="flex flex-col sm:flex-row gap-3">
                <button id="btnCreateRoom" disabled class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Crear Nueva Sala
                </button>
                <div class="flex-1 flex gap-2">
                    <input type="text" id="inputRoomId" placeholder="Código de la sala..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 transition uppercase text-center font-mono">
                    <button id="btnJoinRoom" disabled class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-lg transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="log-in" class="w-4 h-4"></i> Unirse
                    </button>
                </div>
            </div>

            <div id="roomActiveInfo" class="hidden flex-col sm:flex-row items-center justify-between bg-slate-900 p-4 rounded-lg border border-slate-700">
                <div class="flex flex-col">
                    <span class="text-xs text-slate-400">Estás en la sala:</span>
                    <span id="displayRoomId" class="text-xl font-mono font-bold tracking-wider text-indigo-400">---</span>
                </div>
                <div class="flex gap-2 mt-3 sm:mt-0">
                    <button id="btnCopyRoom" class="bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-3 rounded text-sm transition flex items-center gap-2">
                        <i data-lucide="copy" class="w-4 h-4"></i> Copiar Código
                    </button>
                    <button id="btnLeaveRoom" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 py-1.5 px-3 rounded text-sm transition flex items-center gap-2 border border-red-500/20">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                    </button>
                </div>
            </div>
        </div>

        <!-- Reproductor y Controles (Oculto hasta entrar a una sala) -->
        <div id="playerSection" class="hidden flex-col gap-4 relative">
            
            <!-- Buscador Integrado -->
            <div class="relative z-10">
                <div class="bg-slate-800 p-2 rounded-lg flex gap-2 border border-slate-700 shadow-md focus-within:border-indigo-500 transition-colors">
                    <div class="pl-3 flex items-center text-slate-400">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="inputSearch" placeholder="Busca una canción o pega un enlace de YouTube..." class="flex-1 bg-transparent border-none outline-none text-white px-2 placeholder-slate-500">
                    <button id="btnSearch" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-6 rounded-md font-medium transition disabled:opacity-50 flex items-center gap-2">
                        Buscar
                    </button>
                </div>
                
                <!-- Resultados de búsqueda -->
                <div id="searchResults" class="hidden absolute top-full left-0 w-full mt-2 bg-slate-800 border border-slate-700 rounded-lg shadow-xl max-h-80 overflow-y-auto custom-scrollbar flex-col divide-y divide-slate-700/50">
                    <!-- Los resultados se inyectan aquí -->
                </div>
            </div>

            <!-- Contenedor del reproductor de YouTube -->
            <div class="yt-container shadow-2xl border border-slate-800 relative z-0">
                <div id="youtubePlayer"></div>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between items-center text-sm text-slate-400 bg-slate-800 p-3 rounded-lg border border-slate-700 gap-3">
                <span class="flex items-center gap-2 text-center sm:text-left">
                    <i data-lucide="globe" class="w-4 h-4 text-indigo-400"></i> 
                    Cualquiera en la sala puede buscar, cambiar y pausar la música.
                </span>
                <button id="btnForceSync" class="text-indigo-400 hover:text-indigo-300 flex items-center gap-1 transition px-3 py-1 bg-indigo-900/30 rounded-full border border-indigo-900/50">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sincronizar
                </button>
            </div>
        </div>

    </main>

    <!-- Contenedor de Toasts (Notificaciones) -->
    <div id="toastContainer" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Elementos del DOM ---
        const els = {
            statusBadge: document.getElementById('statusBadge'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            roomSetup: document.getElementById('roomSetup'),
            roomActiveInfo: document.getElementById('roomActiveInfo'),
            btnCreateRoom: document.getElementById('btnCreateRoom'),
            inputRoomId: document.getElementById('inputRoomId'),
            btnJoinRoom: document.getElementById('btnJoinRoom'),
            displayRoomId: document.getElementById('displayRoomId'),
            btnCopyRoom: document.getElementById('btnCopyRoom'),
            btnLeaveRoom: document.getElementById('btnLeaveRoom'),
            playerSection: document.getElementById('playerSection'),
            inputSearch: document.getElementById('inputSearch'),
            btnSearch: document.getElementById('btnSearch'),
            searchResults: document.getElementById('searchResults'),
            btnForceSync: document.getElementById('btnForceSync')
        };

        // Inicializar iconos
        lucide.createIcons();

        // --- Utilidades de Interfaz ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-900 border-red-700' : (type === 'success' ? 'bg-green-900 border-green-700' : 'bg-slate-800 border-slate-700');
            toast.className = `toast-enter ${bgClass} border text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2 max-w-xs`;
            
            let iconName = 'info';
            if(type === 'error') iconName = 'alert-circle';
            if(type === 'success') iconName = 'check-circle';
            
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i> <span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function updateConnectionStatus(isConnected, text) {
            els.statusText.textContent = text;
            els.statusBadge.className = isConnected 
                ? 'px-3 py-1 rounded-full text-xs font-semibold bg-green-900/50 text-green-400 flex items-center gap-2 border border-green-800/50'
                : 'px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 flex items-center gap-2 border border-slate-700';
            els.statusDot.className = isConnected ? 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : 'w-2 h-2 rounded-full bg-slate-500';
        }

        // --- Configuración de Firebase (Tuya) ---
        const miConfiguracionFirebase = {
            apiKey: "AIzaSyCjmNEpGoQA1u252eQiVorYyOWe58MAPAE",
            authDomain: "music-duo-feda5.firebaseapp.com",
            databaseURL: "https://music-duo-feda5-default-rtdb.firebaseio.com",
            projectId: "music-duo-feda5",
            storageBucket: "music-duo-feda5.firebasestorage.app",
            messagingSenderId: "161980222119",
            appId: "1:161980222119:web:ad94af73947eefdffd6982"
        };

        let firebaseConfig = Object.keys(miConfiguracionFirebase).length > 0 ? miConfiguracionFirebase : null;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Error leyendo configuración local", e);
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'syncmusic-app';
        
        let app, auth, db;
        try {
            if (!firebaseConfig) throw new Error("No config");
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("Firebase error:", error.message);
            updateConnectionStatus(false, "Falta Configuración");
            els.statusDot.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]';
        }

        // --- Variables de Estado Globales ---
        let currentUser = null;
        let currentRoomId = null;
        let unsubscribeRoom = null;
        let ytPlayer = null;
        let isPlayerReady = false;
        let isRemoteUpdate = false; 
        let lastKnownState = null;

        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for(let i=0; i<6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function extractYouTubeID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // --- Lógica de Búsqueda (API Libre Piped) ---
        async function performSearch(query) {
            els.btnSearch.disabled = true;
            els.btnSearch.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
            lucide.createIcons();

            try {
                // Instancia pública de Piped (no requiere API key)
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                if (!res.ok) throw new Error("API Piped falló");
                
                const data = await res.json();
                const videos = data.items.filter(item => item.type === 'stream').slice(0, 8); // Top 8 resultados
                displaySearchResults(videos);
            } catch (error) {
                console.error("Error buscando:", error);
                // Fallback a otra instancia si la primera falla
                try {
                    const res = await fetch(`https://pipedapi.adminforge.de/search?q=${encodeURIComponent(query)}&filter=all`);
                    const data = await res.json();
                    const videos = data.items.filter(item => item.type === 'stream').slice(0, 8);
                    displaySearchResults(videos);
                } catch (err2) {
                    showToast("Error al buscar. Por favor pega un enlace de YouTube directamente.", "error");
                    els.searchResults.classList.add('hidden');
                }
            } finally {
                els.btnSearch.disabled = false;
                els.btnSearch.innerHTML = 'Buscar';
            }
        }

        function displaySearchResults(videos) {
            els.searchResults.innerHTML = '';
            
            if (videos.length === 0) {
                els.searchResults.innerHTML = '<div class="p-4 text-center text-slate-400">No se encontraron resultados.</div>';
                els.searchResults.classList.remove('hidden');
                return;
            }

            videos.forEach(video => {
                const videoId = video.url.split('?v=')[1];
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 hover:bg-slate-700 cursor-pointer transition";
                div.innerHTML = `
                    <div class="relative w-24 h-16 flex-shrink-0">
                        <img src="${video.thumbnail}" class="w-full h-full object-cover rounded" alt="Miniatura">
                        <span class="absolute bottom-1 right-1 bg-black/80 text-white text-[10px] px-1 rounded">${video.duration > 0 ? Math.floor(video.duration/60)+':'+(video.duration%60).toString().padStart(2,'0') : 'Live'}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-semibold text-white truncate" title="${video.title}">${video.title}</h4>
                        <p class="text-xs text-slate-400 truncate">${video.uploaderName}</p>
                    </div>
                `;
                
                div.onclick = () => {
                    els.searchResults.classList.add('hidden');
                    els.inputSearch.value = ''; // Limpiar búsqueda
                    loadAndSyncVideo(videoId);
                };
                
                els.searchResults.appendChild(div);
            });
            
            els.searchResults.classList.remove('hidden');
        }

        function loadAndSyncVideo(videoId) {
            if (isPlayerReady && ytPlayer) {
                // Al cargar un nuevo video, obligamos a reproducirlo y emitimos a Firestore
                ytPlayer.loadVideoById(videoId);
                updateRoomState(videoId, true, 0);
                showToast("Canción seleccionada. Sincronizando para todos...", "success");
            }
        }

        // Ocultar resultados si se hace click fuera
        document.addEventListener('click', (e) => {
            if (!els.inputSearch.contains(e.target) && !els.searchResults.contains(e.target)) {
                els.searchResults.classList.add('hidden');
            }
        });

        // --- Lógica de Firebase Auth ---
        if (auth && db) {
            async function initAuth() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth error:", error);
                    showToast("Error al conectar", "error");
                }
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    updateConnectionStatus(true, "Conectado");
                    els.btnCreateRoom.disabled = false;
                    els.btnJoinRoom.disabled = false;
                } else {
                    currentUser = null;
                    updateConnectionStatus(false, "Desconectado");
                    els.btnCreateRoom.disabled = true;
                    els.btnJoinRoom.disabled = true;
                }
            });
            initAuth();
        }

        // --- Lógica de YouTube API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('youtubePlayer', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: {
                    'playsinline': 1,
                    'controls': 1, // Controles habilitados para todos
                    'disablekb': 0,
                    'rel': 0,
                    'autoplay': 1
                },
                events: {
                    'onReady': () => { isPlayerReady = true; },
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerStateChange(event) {
            // Si la actualización viene de otro usuario, ignoramos el evento local para no crear un bucle
            if (!currentRoomId || !currentUser || isRemoteUpdate) return;

            // Detectar PAUSA o PLAY generados por el usuario local
            if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                const videoData = ytPlayer.getVideoData();
                if (!videoData || !videoData.video_id) return;

                const isPlaying = event.data === YT.PlayerState.PLAYING;
                const currentTime = ytPlayer.getCurrentTime();

                // Actualizar la base de datos (Esto impactará a los demás)
                updateRoomState(videoData.video_id, isPlaying, currentTime);
            }
        }

        // --- Lógica de Salas (Firestore) ---
        async function updateRoomState(videoId, isPlaying, timestamp) {
            if (!currentRoomId || !currentUser) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                await setDoc(roomRef, {
                    videoId: videoId,
                    isPlaying: isPlaying,
                    timestamp: timestamp,
                    updatedAt: Date.now(),
                    updatedBy: currentUser.uid // Identificador vital para saber quién hizo el cambio
                }, { merge: true });
            } catch (error) {
                console.error("Error actualizando estado:", error);
            }
        }

        function joinRoom(roomId) {
            if (!currentUser) return;
            if (unsubscribeRoom) unsubscribeRoom();

            currentRoomId = roomId.toUpperCase();
            
            els.roomSetup.classList.add('hidden');
            els.roomActiveInfo.classList.remove('hidden');
            els.roomActiveInfo.classList.add('flex');
            els.displayRoomId.textContent = currentRoomId;
            els.playerSection.classList.remove('hidden');
            els.playerSection.classList.add('flex');
            showToast(`Entraste a la sala ${currentRoomId}`, 'success');

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            
            // Escuchar cambios de todos los demás en la sala
            unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    handleRemoteStateChange(data);
                }
            }, (error) => {
                showToast("Error de conexión con la sala.", "error");
            });
        }

        function handleRemoteStateChange(data) {
            if (!isPlayerReady || !ytPlayer || !ytPlayer.getVideoData) return;
            
            // Si el cambio lo hicimos NOSOTROS, lo ignoramos
            if (data.updatedBy === currentUser.uid) return;
            
            lastKnownState = data;
            
            // Bloquear emisión de eventos temporalmente para no re-enviar la orden
            isRemoteUpdate = true; 

            try {
                const currentVideoId = ytPlayer.getVideoData().video_id;
                
                // Si alguien más cambió la canción
                if (data.videoId && currentVideoId !== data.videoId) {
                    if (data.isPlaying) {
                        ytPlayer.loadVideoById(data.videoId, data.timestamp);
                    } else {
                        ytPlayer.cueVideoById(data.videoId, data.timestamp);
                    }
                    showToast("Alguien cambió la canción", "info");
                } else if (data.videoId) {
                    // Si alguien pausó, reanudó o adelantó la misma canción
                    const currentTime = ytPlayer.getCurrentTime() || 0;
                    const timeDiff = Math.abs(currentTime - data.timestamp);
                    
                    if (timeDiff > 2.5) {
                        ytPlayer.seekTo(data.timestamp, true);
                    }

                    if (data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                        ytPlayer.playVideo();
                    } else if (!data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PAUSED) {
                        ytPlayer.pauseVideo();
                    }
                }
            } catch (e) {
                console.error("Error aplicando estado remoto", e);
            }

            // Liberar bloqueo después de procesar
            setTimeout(() => { isRemoteUpdate = false; }, 500);
        }

        function leaveRoom() {
            if (unsubscribeRoom) {
                unsubscribeRoom();
                unsubscribeRoom = null;
            }
            currentRoomId = null;
            lastKnownState = null;
            if (isPlayerReady && ytPlayer) ytPlayer.stopVideo();

            els.roomActiveInfo.classList.add('hidden');
            els.roomActiveInfo.classList.remove('flex');
            els.playerSection.classList.add('hidden');
            els.playerSection.classList.remove('flex');
            els.roomSetup.classList.remove('hidden');
            els.inputRoomId.value = '';
        }

        // --- Listeners de Eventos UI ---
        els.btnCreateRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            joinRoom(generateRoomCode());
        });

        els.btnJoinRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            const code = els.inputRoomId.value.trim();
            if (code.length < 3) return showToast("Ingresa un código válido", "error");
            joinRoom(code);
        });

        els.btnLeaveRoom.addEventListener('click', leaveRoom);

        els.btnCopyRoom.addEventListener('click', () => {
            const tempInput = document.createElement('input');
            tempInput.value = currentRoomId;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast("Código copiado al portapapeles", "success");
        });

        // Evento del botón buscar
        els.btnSearch.addEventListener('click', () => {
            const query = els.inputSearch.value.trim();
            if (!query) return;

            // Si es un enlace pegado directamente, sacamos el ID y lo tocamos
            const videoId = extractYouTubeID(query);
            if (videoId) {
                els.searchResults.classList.add('hidden');
                els.inputSearch.value = '';
                loadAndSyncVideo(videoId);
            } else {
                // Si es texto, buscamos en la API
                performSearch(query);
            }
        });

        // Permitir Enter en inputs
        els.inputRoomId.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') els.btnJoinRoom.click();
        });
        
        els.inputSearch.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') els.btnSearch.click();
        });

        els.btnForceSync.addEventListener('click', () => {
            if (lastKnownState) {
                showToast("Forzando sincronización...", "info");
                handleRemoteStateChange({...lastKnownState, updatedBy: 'force'}); 
            } else if (isPlayerReady) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.video_id) {
                    updateRoomState(
                        videoData.video_id, 
                        ytPlayer.getPlayerState() === YT.PlayerState.PLAYING, 
                        ytPlayer.getCurrentTime()
                    );
                    showToast("Estado sincronizado con la sala", "success");
                }
            }
        });

    </script>
</body>
</html>
