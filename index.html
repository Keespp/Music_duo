<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncMusic - Escucha con amigos</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .yt-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
            background: #000;
        }
        .yt-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        /* Toast animaciones */
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        
        /* Scrollbar para resultados y chat */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* Animación de Reacciones Flotantes */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(var(--rot-start)); opacity: 0; }
            10% { opacity: 1; scale: 1; }
            100% { transform: translateY(-180px) scale(1.5) rotate(var(--rot-end)); opacity: 0; }
        }
        .floating-emoji {
            animation: floatUp 2s ease-out forwards;
            position: absolute;
            bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-md z-20 sticky top-0">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-400">
                <i data-lucide="headphones" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold text-white">Sync<span class="text-indigo-400">Music</span></h1>
            </div>
            <div id="statusBadge" class="px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 flex items-center gap-2 transition-colors">
                <span class="w-2 h-2 rounded-full bg-slate-500" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col gap-6 mt-2">
        
        <!-- Controles de Sala -->
        <div class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="users" class="w-5 h-5 text-indigo-400"></i>
                Sala de Escucha Compartida
            </h2>
            
            <div id="roomSetup" class="flex flex-col sm:flex-row gap-3">
                <button id="btnCreateRoom" disabled class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Crear Nueva Sala
                </button>
                <div class="flex-1 flex gap-2">
                    <input type="text" id="inputRoomId" placeholder="Código de la sala..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500 transition uppercase text-center font-mono">
                    <button id="btnJoinRoom" disabled class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-lg transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="log-in" class="w-4 h-4"></i> Unirse
                    </button>
                </div>
            </div>

            <div id="roomActiveInfo" class="hidden flex-col sm:flex-row items-center justify-between bg-slate-900 p-4 rounded-lg border border-slate-700">
                <div class="flex flex-col">
                    <span class="text-xs text-slate-400">Estás en la sala:</span>
                    <span id="displayRoomId" class="text-xl font-mono font-bold tracking-wider text-indigo-400">---</span>
                </div>
                <div class="flex gap-2 mt-3 sm:mt-0">
                    <button id="btnCopyRoom" class="bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-3 rounded text-sm transition flex items-center gap-2">
                        <i data-lucide="copy" class="w-4 h-4"></i> Copiar Código
                    </button>
                    <button id="btnLeaveRoom" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 py-1.5 px-3 rounded text-sm transition flex items-center gap-2 border border-red-500/20">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                    </button>
                </div>
            </div>
        </div>

        <!-- Layout Principal (Oculto hasta entrar a una sala) -->
        <div id="playerSection" class="hidden grid-cols-1 lg:grid-cols-3 gap-6 relative">
            
            <!-- Columna Izquierda: Reproductor y Buscador -->
            <div class="col-span-1 lg:col-span-2 flex flex-col gap-4">
                
                <!-- Buscador Integrado -->
                <div class="relative z-10">
                    <div class="bg-slate-800 p-2 rounded-lg flex gap-2 border border-slate-700 shadow-md focus-within:border-indigo-500 transition-colors">
                        <div class="pl-3 flex items-center text-slate-400">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="inputSearch" placeholder="Busca, pega un enlace de video o de playlist..." class="flex-1 bg-transparent border-none outline-none text-white px-2 placeholder-slate-500">
                        <button id="btnSearch" class="bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-6 rounded-md font-medium transition disabled:opacity-50 flex items-center gap-2">
                            Buscar
                        </button>
                    </div>
                    
                    <!-- Resultados de búsqueda -->
                    <div id="searchResults" class="hidden absolute top-full left-0 w-full mt-2 bg-slate-800 border border-slate-700 rounded-lg shadow-xl max-h-96 overflow-y-auto custom-scrollbar flex-col divide-y divide-slate-700/50">
                        <!-- Los resultados se inyectan aquí -->
                    </div>
                </div>

                <!-- Contenedor del reproductor de YouTube con capa de reacciones -->
                <div class="yt-container shadow-2xl border border-slate-800 relative z-0 group">
                    <div id="youtubePlayer"></div>
                    <!-- Capa invisible para atrapar las reacciones animadas -->
                    <div id="reactionOverlay" class="absolute inset-0 pointer-events-none flex items-end justify-center overflow-hidden"></div>
                </div>
                
                <!-- Controles Inferiores y Reacciones -->
                <div class="flex flex-col sm:flex-row justify-between items-center text-sm text-slate-400 bg-slate-800 p-3 rounded-lg border border-slate-700 gap-3">
                    
                    <!-- Barra de Reacciones -->
                    <div class="flex items-center gap-2 bg-slate-900/50 px-4 py-1.5 rounded-full border border-slate-700/80 shadow-inner">
                        <span class="text-xs text-slate-500 mr-1 hidden sm:inline"><i data-lucide="sparkles" class="w-3 h-3 inline"></i> Reaccionar:</span>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-1 transition transform text-xl cursor-pointer" data-emoji="❤️">❤️</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-1 transition transform text-xl cursor-pointer" data-emoji="🔥">🔥</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-1 transition transform text-xl cursor-pointer" data-emoji="🎶">🎶</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-1 transition transform text-xl cursor-pointer" data-emoji="😎">😎</button>
                        <button class="reaction-btn hover:scale-125 hover:-translate-y-1 transition transform text-xl cursor-pointer" data-emoji="😂">😂</button>
                    </div>

                    <div class="flex gap-2">
                        <!-- Botón Saltar Siguiente -->
                        <button id="btnSkipNext" class="text-white hover:text-indigo-300 flex items-center gap-1 transition px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-full border border-slate-600">
                            <i data-lucide="skip-forward" class="w-4 h-4"></i> Saltar
                        </button>
                        <!-- Botón Forzar Sincronización -->
                        <button id="btnForceSync" class="text-indigo-400 hover:text-indigo-300 flex items-center gap-1 transition px-3 py-1.5 bg-indigo-900/30 rounded-full border border-indigo-900/50 tooltip" title="Forzar resincronización">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Cola y Chat -->
            <div class="col-span-1 flex flex-col gap-4 h-[600px] lg:h-auto">
                
                <!-- Pestañas Cola / Chat -->
                <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 flex flex-col flex-1 overflow-hidden">
                    
                    <div class="flex border-b border-slate-700 bg-slate-900/50">
                        <button id="tabQueue" class="flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 flex justify-center items-center gap-2">
                            <i data-lucide="list-music" class="w-4 h-4"></i> Cola
                        </button>
                        <button id="tabChat" class="flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 flex justify-center items-center gap-2">
                            <i data-lucide="message-square" class="w-4 h-4"></i> Chat
                        </button>
                    </div>

                    <!-- Panel: Cola de Reproducción -->
                    <div id="panelQueue" class="flex-1 overflow-y-auto custom-scrollbar p-2 flex flex-col gap-2 relative">
                        <!-- La cola se inyecta aquí -->
                        <div id="emptyQueueMsg" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 text-sm p-4 text-center">
                            <i data-lucide="music" class="w-8 h-8 mb-2 opacity-50"></i>
                            La cola está vacía.<br>Busca una canción y añádela.
                        </div>
                    </div>

                    <!-- Panel: Chat -->
                    <div id="panelChat" class="hidden flex-1 flex-col overflow-hidden bg-slate-900/30 relative">
                        
                        <!-- Header de Chat: Personalizar Nombre -->
                        <div class="p-2 border-b border-slate-700/50 bg-slate-800/80 flex items-center gap-2 text-xs">
                            <span class="text-slate-400 whitespace-nowrap"><i data-lucide="user-pen" class="w-3 h-3 inline"></i> Tu nombre:</span>
                            <input type="text" id="inputUsername" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-white focus:outline-none focus:border-indigo-500 flex-1 min-w-0" placeholder="Ej. Juan">
                            <button id="btnSaveName" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded transition">Guardar</button>
                        </div>

                        <div id="chatMessages" class="flex-1 overflow-y-auto custom-scrollbar p-3 flex flex-col gap-3">
                            <!-- Los mensajes se inyectan aquí -->
                        </div>
                        <div class="p-3 bg-slate-800 border-t border-slate-700">
                            <form id="chatForm" class="flex gap-2">
                                <input type="text" id="inputChat" placeholder="Escribe un mensaje..." class="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 text-white" autocomplete="off">
                                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded transition">
                                    <i data-lucide="send" class="w-4 h-4"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </main>

    <!-- Contenedor de Toasts -->
    <div id="toastContainer" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Elementos del DOM ---
        const els = {
            statusBadge: document.getElementById('statusBadge'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            roomSetup: document.getElementById('roomSetup'),
            roomActiveInfo: document.getElementById('roomActiveInfo'),
            btnCreateRoom: document.getElementById('btnCreateRoom'),
            inputRoomId: document.getElementById('inputRoomId'),
            btnJoinRoom: document.getElementById('btnJoinRoom'),
            displayRoomId: document.getElementById('displayRoomId'),
            btnCopyRoom: document.getElementById('btnCopyRoom'),
            btnLeaveRoom: document.getElementById('btnLeaveRoom'),
            playerSection: document.getElementById('playerSection'),
            inputSearch: document.getElementById('inputSearch'),
            btnSearch: document.getElementById('btnSearch'),
            searchResults: document.getElementById('searchResults'),
            btnForceSync: document.getElementById('btnForceSync'),
            btnSkipNext: document.getElementById('btnSkipNext'),
            tabQueue: document.getElementById('tabQueue'),
            tabChat: document.getElementById('tabChat'),
            panelQueue: document.getElementById('panelQueue'),
            panelChat: document.getElementById('panelChat'),
            emptyQueueMsg: document.getElementById('emptyQueueMsg'),
            chatMessages: document.getElementById('chatMessages'),
            chatForm: document.getElementById('chatForm'),
            inputChat: document.getElementById('inputChat'),
            inputUsername: document.getElementById('inputUsername'),
            btnSaveName: document.getElementById('btnSaveName'),
            reactionOverlay: document.getElementById('reactionOverlay')
        };

        // Inicializar iconos
        lucide.createIcons();

        // --- Utilidades de Interfaz ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-900 border-red-700' : (type === 'success' ? 'bg-green-900 border-green-700' : 'bg-slate-800 border-slate-700');
            toast.className = `toast-enter ${bgClass} border text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2 max-w-xs`;
            
            let iconName = 'info';
            if(type === 'error') iconName = 'alert-circle';
            if(type === 'success') iconName = 'check-circle';
            
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i> <span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function updateConnectionStatus(isConnected, text) {
            els.statusText.textContent = text;
            els.statusBadge.className = isConnected 
                ? 'px-3 py-1 rounded-full text-xs font-semibold bg-green-900/50 text-green-400 flex items-center gap-2 border border-green-800/50'
                : 'px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 flex items-center gap-2 border border-slate-700';
            els.statusDot.className = isConnected ? 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : 'w-2 h-2 rounded-full bg-slate-500';
        }

        // Cambio de Pestañas (Cola / Chat)
        els.tabQueue.addEventListener('click', () => {
            els.panelQueue.classList.remove('hidden');
            els.panelChat.classList.add('hidden');
            els.panelChat.classList.remove('flex');
            els.tabQueue.className = "flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 flex justify-center items-center gap-2";
            els.tabChat.className = "flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 flex justify-center items-center gap-2";
        });
        els.tabChat.addEventListener('click', () => {
            els.panelQueue.classList.add('hidden');
            els.panelChat.classList.remove('hidden');
            els.panelChat.classList.add('flex');
            els.tabChat.className = "flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 flex justify-center items-center gap-2";
            els.tabQueue.className = "flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 flex justify-center items-center gap-2";
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight; // Auto-scroll
        });

        // --- Configuración de Firebase (Tuya) ---
        const miConfiguracionFirebase = {
            apiKey: "AIzaSyCjmNEpGoQA1u252eQiVorYyOWe58MAPAE",
            authDomain: "music-duo-feda5.firebaseapp.com",
            databaseURL: "https://music-duo-feda5-default-rtdb.firebaseio.com",
            projectId: "music-duo-feda5",
            storageBucket: "music-duo-feda5.firebasestorage.app",
            messagingSenderId: "161980222119",
            appId: "1:161980222119:web:ad94af73947eefdffd6982"
        };

        let firebaseConfig = Object.keys(miConfiguracionFirebase).length > 0 ? miConfiguracionFirebase : null;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) { console.error(e); }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'syncmusic-app';
        let app, auth, db;
        try {
            if (!firebaseConfig) throw new Error("No config");
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            updateConnectionStatus(false, "Falta Configuración");
            els.statusDot.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]';
        }

        // --- Variables de Estado Globales ---
        let currentUser = null;
        let username = "Anónimo";
        let currentRoomId = null;
        let unsubscribeRoom = null;
        let ytPlayer = null;
        let isPlayerReady = false;
        let isRemoteUpdate = false; 
        let lastKnownState = null;
        let lastVideoUpdateTimestamp = null;
        let lastReactionId = null; // Para evitar repetir la misma reacción

        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for(let i=0; i<6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function extractYouTubeID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // NUEVO: Extraer ID de Playlist de un enlace
        function extractPlaylistID(url) {
            const regExp = /[?&]list=([^#\&\?]+)/;
            const match = url.match(regExp);
            return match ? match[1] : false;
        }

        // --- Configuración API de YouTube ---
        const YOUTUBE_API_KEY = "AIzaSyDTNEawkTGfUwuImfTaDUmHqE6plo4FYnE";

        // --- Lógica de Búsqueda ---
        async function performSearch(query) {
            if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "TU_API_KEY_DE_YOUTUBE_AQUI") {
                showToast("Por favor, configura tu API Key de YouTube.", "error"); return;
            }

            els.btnSearch.disabled = true;
            els.btnSearch.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
            lucide.createIcons();

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error((await res.json()).error?.message || "Error API");
                const data = await res.json();
                
                const videos = data.items.map(item => ({
                    id: item.id.videoId,
                    title: item.snippet.title.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&#39;/g, "'"),
                    uploaderName: item.snippet.channelTitle,
                    thumbnail: item.snippet.thumbnails.medium.url,
                    duration: 0
                }));
                displaySearchResults(videos);
            } catch (err) {
                showToast("Error al buscar: " + err.message, "error");
                els.searchResults.classList.add('hidden');
            } finally {
                els.btnSearch.disabled = false;
                els.btnSearch.innerHTML = 'Buscar';
            }
        }

        // NUEVO: Lógica para descargar una Playlist completa
        async function loadPlaylist(playlistId) {
            if (!YOUTUBE_API_KEY) return;
            
            els.btnSearch.disabled = true;
            els.btnSearch.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>';
            showToast("Procesando playlist...", "info");

            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${YOUTUBE_API_KEY}`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("La playlist es privada o no existe.");
                const data = await res.json();

                const videos = data.items
                    // Filtrar videos eliminados o privados
                    .filter(item => item.snippet.title !== "Private video" && item.snippet.title !== "Deleted video")
                    .map(item => ({
                        id: item.snippet.resourceId.videoId,
                        title: item.snippet.title ? item.snippet.title.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&#39;/g, "'") : "Sin título",
                        uploaderName: item.snippet.videoOwnerChannelTitle || "Desconocido",
                        thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "",
                        duration: 0
                    }));

                if (videos.length > 0) {
                    await enqueuePlaylist(videos);
                    showToast(`¡Se añadieron ${videos.length} videos de la playlist a la cola!`, "success");
                } else {
                    showToast("La playlist está vacía o sus videos son privados.", "error");
                }
            } catch (err) {
                showToast("Error: " + err.message, "error");
            } finally {
                els.btnSearch.disabled = false;
                els.btnSearch.innerHTML = 'Buscar';
            }
        }

        function displaySearchResults(videos) {
            els.searchResults.innerHTML = '';
            if (videos.length === 0) {
                els.searchResults.innerHTML = '<div class="p-4 text-center text-slate-400">Sin resultados.</div>';
                els.searchResults.classList.remove('hidden');
                return;
            }

            videos.forEach(video => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 hover:bg-slate-700 transition group relative";
                div.innerHTML = `
                    <div class="relative w-24 h-16 flex-shrink-0 cursor-pointer" onclick="loadAndSyncVideo('${video.id}')">
                        <img src="${video.thumbnail}" class="w-full h-full object-cover rounded" alt="Miniatura">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition rounded">
                            <i data-lucide="play" class="w-6 h-6 text-white"></i>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0 pr-10 cursor-pointer" onclick="loadAndSyncVideo('${video.id}')">
                        <h4 class="text-sm font-semibold text-white truncate" title="${video.title.replace(/"/g, '&quot;')}">${video.title}</h4>
                        <p class="text-xs text-slate-400 truncate">${video.uploaderName}</p>
                    </div>
                    <!-- Botones Rápidos -->
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition flex gap-1 bg-slate-800 p-1 rounded shadow-lg border border-slate-600">
                        <button class="bg-indigo-600 hover:bg-indigo-500 p-1.5 rounded text-white transition tooltip" title="Reproducir ahora" onclick="loadAndSyncVideo('${video.id}')">
                            <i data-lucide="play" class="w-4 h-4"></i>
                        </button>
                        <button class="bg-slate-600 hover:bg-slate-500 p-1.5 rounded text-white transition tooltip" title="Añadir a la cola" id="btnQ-${video.id}">
                            <i data-lucide="list-plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                els.searchResults.appendChild(div);

                // Agregar evento para el botón de cola
                setTimeout(() => {
                    document.getElementById(`btnQ-${video.id}`).addEventListener('click', (e) => {
                        e.stopPropagation();
                        enqueueVideo(video);
                        els.searchResults.classList.add('hidden');
                        els.inputSearch.value = '';
                    });
                }, 0);
            });
            lucide.createIcons({ root: els.searchResults });
            els.searchResults.classList.remove('hidden');
        }

        // --- Lógica de la Cola y Chat (Firestore) ---
        async function enqueueVideo(video) {
            if (!currentRoomId || !currentUser) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            try {
                await updateDoc(roomRef, { queue: arrayUnion(video) });
                showToast("Añadido a la cola", "success");
            } catch (error) { console.error("Error al añadir a la cola", error); }
        }

        // NUEVO: Función para añadir múltiples videos de golpe
        async function enqueuePlaylist(videosArray) {
            if (!currentRoomId || !currentUser || !videosArray.length) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            try {
                // arrayUnion acepta múltiples argumentos separándolos con comas
                await updateDoc(roomRef, { queue: arrayUnion(...videosArray) });
            } catch (error) { console.error("Error al añadir playlist a la cola", error); }
        }

        async function removeQueueItem(video) {
            if (!currentRoomId || !currentUser) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            try {
                await updateDoc(roomRef, {
                    queue: arrayRemove(video)
                });
            } catch (error) { console.error(error); }
        }

        // --- FUNCION DE SALTAR A LA SIGUIENTE CANCION ---
        els.btnSkipNext.addEventListener('click', () => {
            if (!currentRoomId || !currentUser) return;
            if (playNextFromQueue()) {
                showToast("Saltando a la siguiente canción", "info");
            } else {
                showToast("No hay más canciones en la cola", "error");
            }
        });

        // --- FUNCION DE ACTUALIZAR NOMBRE DE USUARIO ---
        els.btnSaveName.addEventListener('click', () => {
            const newName = els.inputUsername.value.trim();
            if (newName.length > 0) {
                username = newName;
                showToast(`Tu nombre ahora es: ${username}`, "success");
            } else {
                els.inputUsername.value = username; // Restaurar si está vacío
            }
        });
        
        els.inputUsername.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') els.btnSaveName.click();
        });

        async function sendChatMessage(text) {
            if (!currentRoomId || !currentUser || !text.trim()) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const msg = {
                id: Date.now().toString() + Math.floor(Math.random()*100),
                user: username,
                text: text.trim(),
                time: Date.now()
            };
            try {
                await updateDoc(roomRef, { chat: arrayUnion(msg) });
            } catch (error) { console.error(error); }
        }

        // --- LÓGICA DE REACCIONES FLOTANTES ---
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const emoji = btn.getAttribute('data-emoji');
                sendReaction(emoji);
                // Mostrar localmente de inmediato para mayor rapidez visual
                showFloatingReaction(emoji, "Tú"); 
            });
        });

        async function sendReaction(emoji) {
            if (!currentRoomId || !currentUser) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            try {
                // Generamos un ID único para la reacción
                const reactionId = Date.now().toString() + Math.floor(Math.random() * 1000);
                lastReactionId = reactionId; // Guardamos nuestro propio ID para no duplicarlo al recibirlo
                
                await updateDoc(roomRef, {
                    latestReaction: {
                        id: reactionId,
                        emoji: emoji,
                        user: username
                    }
                });
            } catch (e) { console.error("Error al enviar reacción", e); }
        }

        function showFloatingReaction(emoji, userName) {
            const overlay = els.reactionOverlay;
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            
            // Posición aleatoria horizontal (entre el 20% y el 80% del ancho del reproductor)
            const leftOffset = 20 + Math.random() * 60; 
            el.style.left = `${leftOffset}%`;
            
            // Rotación inicial y final aleatoria para que cada emoji suba de forma única
            el.style.setProperty('--rot-start', `${Math.random() * 40 - 20}deg`);
            el.style.setProperty('--rot-end', `${Math.random() * 80 - 40}deg`);
            
            el.innerHTML = `
                <span class="text-4xl drop-shadow-lg">${emoji}</span>
                <span class="text-[10px] bg-black/60 px-1.5 py-0.5 rounded text-white mt-1 font-medium tracking-wide shadow-md whitespace-nowrap">${userName}</span>
            `;
            
            overlay.appendChild(el);
            
            // Limpiar del DOM al terminar la animación
            setTimeout(() => { if(el.parentElement) el.remove(); }, 2000);
        }

        // Renders visuales
        function renderQueue(queueArray) {
            if (!queueArray || queueArray.length === 0) {
                els.emptyQueueMsg.style.display = 'flex';
                // Borrar items excepto el mensaje vacío
                Array.from(els.panelQueue.children).forEach(child => {
                    if(child.id !== 'emptyQueueMsg') child.remove();
                });
                return;
            }
            
            els.emptyQueueMsg.style.display = 'none';
            // Limpiar
            Array.from(els.panelQueue.children).forEach(child => {
                if(child.id !== 'emptyQueueMsg') child.remove();
            });

            queueArray.forEach((video, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 bg-slate-900/50 p-2 rounded border border-slate-700/50 group";
                div.innerHTML = `
                    <span class="text-xs font-bold text-slate-500 w-4 text-center">${index + 1}</span>
                    <img src="${video.thumbnail}" class="w-12 h-8 object-cover rounded">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-white truncate">${video.title}</p>
                        <p class="text-[10px] text-slate-400 truncate">${video.uploaderName}</p>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-400 p-1 transition" id="rmQ-${video.id}-${index}" title="Eliminar">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                `;
                els.panelQueue.appendChild(div);

                setTimeout(() => {
                    document.getElementById(`rmQ-${video.id}-${index}`).addEventListener('click', () => removeQueueItem(video));
                }, 0);
            });
            lucide.createIcons({ root: els.panelQueue });
        }

        function renderChat(chatArray) {
            els.chatMessages.innerHTML = '';
            if(!chatArray) return;
            
            // Mostrar últimos 50 mensajes
            const visibleChat = chatArray.slice(-50);
            
            visibleChat.forEach(msg => {
                const isMe = msg.user === username;
                const div = document.createElement('div');
                div.className = `flex flex-col max-w-[85%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;
                
                const timeStr = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                div.innerHTML = `
                    <span class="text-[10px] text-slate-400 mb-0.5 px-1">${isMe ? 'Tú' : msg.user} • ${timeStr}</span>
                    <div class="px-3 py-2 rounded-lg text-sm ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-700 text-slate-100 rounded-tl-none'} break-words">
                        ${msg.text}
                    </div>
                `;
                els.chatMessages.appendChild(div);
            });
            // Auto scroll down
            els.chatMessages.scrollTop = els.chatMessages.scrollHeight;
        }

        // --- Player logic ---
        function playNextFromQueue() {
            if (lastKnownState && lastKnownState.queue && lastKnownState.queue.length > 0) {
                const nextVideo = lastKnownState.queue[0];
                const newQueue = lastKnownState.queue.slice(1); 
                
                // 1. Reproducir localmente primero para no quedarse trabado
                if (isPlayerReady && ytPlayer) {
                    ytPlayer.loadVideoById(nextVideo.id);
                }
                
                // 2. Actualizar a los demás
                updateRoomState(nextVideo.id, true, 0, newQueue);
                return true;
            }
            return false;
        }

        function loadAndSyncVideo(videoId) {
            if (isPlayerReady && ytPlayer) {
                els.searchResults.classList.add('hidden');
                els.inputSearch.value = '';
                ytPlayer.loadVideoById(videoId);
                updateRoomState(videoId, true, 0);
                showToast("Canción seleccionada", "success");
            }
        }
        
        // Exponer la función globalmente para que los botones HTML generados puedan usarla
        window.loadAndSyncVideo = loadAndSyncVideo;

        document.addEventListener('click', (e) => {
            if (!els.inputSearch.contains(e.target) && !els.searchResults.contains(e.target)) {
                els.searchResults.classList.add('hidden');
            }
        });

        // --- Lógica de Firebase Auth ---
        if (auth && db) {
            async function initAuth() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) { showToast("Error al conectar", "error"); }
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    username = "Usuario_" + user.uid.substring(0,4); // Asignar nombre automático
                    els.inputUsername.value = username; // Reflejar en la UI del chat
                    updateConnectionStatus(true, "Conectado");
                    els.btnCreateRoom.disabled = false;
                    els.btnJoinRoom.disabled = false;
                } else {
                    currentUser = null;
                    updateConnectionStatus(false, "Desconectado");
                    els.btnCreateRoom.disabled = true;
                    els.btnJoinRoom.disabled = true;
                }
            });
            initAuth();
        }

        // --- Lógica de YouTube API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('youtubePlayer', {
                height: '100%', width: '100%', videoId: '', 
                playerVars: { 'playsinline': 1, 'controls': 1, 'disablekb': 0, 'rel': 0, 'autoplay': 1 },
                events: {
                    'onReady': () => { isPlayerReady = true; },
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerStateChange(event) {
            // Reproducción automática de la cola al terminar la canción
            if (event.data === YT.PlayerState.ENDED) {
                playNextFromQueue();
                return;
            }

            if (!currentRoomId || !currentUser || isRemoteUpdate) return;

            if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                const videoData = ytPlayer.getVideoData();
                if (!videoData || !videoData.video_id) return;
                const isPlaying = event.data === YT.PlayerState.PLAYING;
                updateRoomState(videoData.video_id, isPlaying, ytPlayer.getCurrentTime());
            }
        }

        // --- Lógica de Salas (Firestore) ---
        async function updateRoomState(videoId, isPlaying, timestamp, overrideQueue = null) {
            if (!currentRoomId || !currentUser) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                const payload = {
                    videoId: videoId,
                    isPlaying: isPlaying,
                    timestamp: timestamp,
                    updatedAt: Date.now(),
                    updatedBy: currentUser.uid
                };
                if (overrideQueue !== null) payload.queue = overrideQueue;
                
                // Usamos merge:true para no sobreescribir el chat o la cola si no la enviamos
                await setDoc(roomRef, payload, { merge: true });
            } catch (error) { console.error("Error actualizando estado:", error); }
        }

        function joinRoom(roomId) {
            if (!currentUser) return;
            if (unsubscribeRoom) unsubscribeRoom();

            currentRoomId = roomId.toUpperCase();
            
            els.roomSetup.classList.add('hidden');
            els.roomActiveInfo.classList.remove('hidden');
            els.roomActiveInfo.classList.add('flex');
            els.displayRoomId.textContent = currentRoomId;
            els.playerSection.classList.remove('hidden');
            els.playerSection.classList.add('grid');
            showToast(`Entraste a la sala ${currentRoomId}`, 'success');

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            
            // Escuchar cambios de la sala (Cola, Chat, Reacciones y Reproductor)
            unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 1. Actualizar UI de la Cola y el Chat para todos
                    renderQueue(data.queue || []);
                    renderChat(data.chat || []);

                    // 2. Procesar Reacciones en Vivo
                    if (data.latestReaction && data.latestReaction.id !== lastReactionId) {
                        lastReactionId = data.latestReaction.id; // Evitar repetirla
                        showFloatingReaction(data.latestReaction.emoji, data.latestReaction.user);
                    }

                    // 3. Procesar el estado del video
                    handleRemoteStateChange(data);
                }
            }, (error) => {
                showToast("Error de conexión con la sala.", "error");
            });
        }

        function handleRemoteStateChange(data) {
            if (!isPlayerReady || !ytPlayer || !ytPlayer.getVideoData) return;
            
            // PREVENCIÓN DE REINICIO POR CHAT/COLA/REACCIONES:
            // Comparamos si el cambio proviene de una actualización real del reproductor (updatedAt diferente)
            if (data.updatedAt && data.updatedAt === lastVideoUpdateTimestamp) {
                lastKnownState = data;
                return; 
            }
            lastVideoUpdateTimestamp = data.updatedAt;

            // Si el cambio del REPRODUCTOR lo hicimos nosotros, lo ignoramos para evitar ecos
            if (data.updatedBy === currentUser.uid) {
                lastKnownState = data;
                return;
            }
            
            lastKnownState = data;
            isRemoteUpdate = true; 

            try {
                const currentVideoId = ytPlayer.getVideoData().video_id;
                
                if (data.videoId && currentVideoId !== data.videoId) {
                    if (data.isPlaying) ytPlayer.loadVideoById(data.videoId, data.timestamp);
                    else ytPlayer.cueVideoById(data.videoId, data.timestamp);
                } else if (data.videoId) {
                    const currentTime = ytPlayer.getCurrentTime() || 0;
                    const timeDiff = Math.abs(currentTime - data.timestamp);
                    
                    if (timeDiff > 2.5) ytPlayer.seekTo(data.timestamp, true);

                    if (data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    else if (!data.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PAUSED) ytPlayer.pauseVideo();
                }
            } catch (e) {}

            setTimeout(() => { isRemoteUpdate = false; }, 500);
        }

        function leaveRoom() {
            if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            currentRoomId = null; lastKnownState = null; lastVideoUpdateTimestamp = null; lastReactionId = null;
            if (isPlayerReady && ytPlayer) ytPlayer.stopVideo();

            els.roomActiveInfo.classList.add('hidden'); els.roomActiveInfo.classList.remove('flex');
            els.playerSection.classList.add('hidden'); els.playerSection.classList.remove('grid');
            els.roomSetup.classList.remove('hidden'); els.inputRoomId.value = '';
        }

        // --- Listeners de Eventos UI ---
        els.btnCreateRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            joinRoom(generateRoomCode());
        });

        els.btnJoinRoom.addEventListener('click', () => {
            if (!currentUser) return showToast("No conectado", "error");
            const code = els.inputRoomId.value.trim();
            if (code.length < 3) return showToast("Ingresa un código válido", "error");
            joinRoom(code);
        });

        els.btnLeaveRoom.addEventListener('click', leaveRoom);

        els.btnCopyRoom.addEventListener('click', () => {
            const tempInput = document.createElement('input'); tempInput.value = currentRoomId;
            document.body.appendChild(tempInput); tempInput.select(); document.execCommand('copy');
            document.body.removeChild(tempInput); showToast("Código copiado al portapapeles", "success");
        });

        // NUEVA Lógica del botón de búsqueda para manejar Playlists vs Videos
        els.btnSearch.addEventListener('click', () => {
            const query = els.inputSearch.value.trim();
            if (!query) return;
            
            const videoId = extractYouTubeID(query);
            const playlistId = extractPlaylistID(query);

            if (videoId || playlistId) {
                els.searchResults.classList.add('hidden'); 
                els.inputSearch.value = '';
                
                // Si el enlace tiene un ID de video, lo ponemos a reproducir de inmediato
                if (videoId) {
                    loadAndSyncVideo(videoId);
                }
                // Si el enlace tiene un ID de playlist (puede tener ambos), cargamos el resto a la cola
                if (playlistId) {
                    loadPlaylist(playlistId);
                }
            } else { 
                // Si no es un enlace, hacemos una búsqueda de texto normal
                performSearch(query); 
            }
        });

        els.inputRoomId.addEventListener('keypress', (e) => { if (e.key === 'Enter') els.btnJoinRoom.click(); });
        els.inputSearch.addEventListener('keypress', (e) => { if (e.key === 'Enter') els.btnSearch.click(); });

        // Evento Enviar Chat
        els.chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = els.inputChat.value;
            if (text) {
                sendChatMessage(text);
                els.inputChat.value = '';
            }
        });

        els.btnForceSync.addEventListener('click', () => {
            if (lastKnownState) {
                showToast("Forzando sincronización...", "info");
                handleRemoteStateChange({...lastKnownState, updatedBy: 'force', updatedAt: Date.now()}); 
            } else if (isPlayerReady) {
                const videoData = ytPlayer.getVideoData();
                if (videoData && videoData.video_id) {
                    updateRoomState(videoData.video_id, ytPlayer.getPlayerState() === YT.PlayerState.PLAYING, ytPlayer.getCurrentTime());
                    showToast("Estado sincronizado", "success");
                }
            }
        });

    </script>
</body>
</html>
